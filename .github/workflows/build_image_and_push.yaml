name: Build docker image and push to ghcr.io

on:
  push:
    branches:
      - main

  workflow_dispatch:

jobs:
  build-image-and-push-job:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v7.0.0

      - name: Setup java environment
        uses: actions/setup-java@v5.6.0
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Verify code
        run: ./mvnw --batch-mode --no-transfer-progress clean verify

      - name: Read project metadata
        id: metadata
        shell: bash
        run: |
          artifactId=$(
            ./mvnw help:evaluate -Dexpression=project.artifactId \
            -q \
            -DforceStdout
          )
          
          version=$(
            ./mvnw help:evaluate -Dexpression=project.version \
            -q \
            -DforceStdout
          )
          
          git_commit=${GITHUB_SHA::7}
          
          echo "image_name=${artifactId}" >> ${GITHUB_OUTPUT}
          echo "image_tag=${version}-${git_commit}" >> ${GITHUB_OUTPUT}

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: docker build -t "ghcr.io/${{github.repository_owner}}/${{steps.metadata.outputs.image_name}}:${{ steps.metadata.outputs.image_tag }}" .

      - name: Push image
        run: docker push "ghcr.io/${{github.repository_owner}}/${{steps.metadata.outputs.image_name}}:${{ steps.metadata.outputs.image_tag }}"